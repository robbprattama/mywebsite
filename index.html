<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Profile</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        background:#000;
        overflow:hidden;
        font-family:Arial, Helvetica, sans-serif;
    }

    canvas{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        z-index:0;
    }

    .content{
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        text-align:center;
        z-index:10;
    }

    .profile{
        width:180px;
        height:180px;
        border-radius:50%;
        object-fit:cover;
        border:4px solid #00ff00;
        box-shadow:0 0 20px #00ff00;
        transition:.3s;
    }

    .profile:hover{
        transform:scale(1.08);
        box-shadow:0 0 40px #00ff00;
    }

    .content a{
        text-decoration:none;
    }

    h1{
        margin-top:20px;
        color:#00ff00;
        text-shadow:0 0 15px #00ff00;
        font-size:38px;
    }

    p{
        color:#9cff9c;
        margin-top:10px;
        font-size:18px;
    }

</style>

</head>
<body>

<canvas id="matrix"></canvas>

<div class="content">

    <!-- Ganti link Facebook di bawah -->
    <a href="https://www.facebook.com/USERNAME_ANDA" target="_blank">

        <!-- Ganti nama file jika berbeda -->
        <img src="images/foto.jpg" class="profile" alt="Foto Profil">

    </a>

    <h1>Nama Anda</h1>

    <p>Klik foto untuk membuka Facebook</p>

</div>

<script>

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

const chars="01アｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ";

const fontSize=16;

let columns;
let drops=[];

function resize(){

    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;

    columns=Math.floor(canvas.width/fontSize);

    drops=[];

    for(let i=0;i<columns;i++){
        drops[i]=Math.random()*canvas.height/fontSize;
    }

}

window.addEventListener("resize",resize);

resize();

function draw(){

    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00FF00";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){

        const text=chars[Math.floor(Math.random()*chars.length)];

        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize>canvas.height && Math.random()>0.975){

            drops[i]=0;

        }

        drops[i]++;

    }

}

setInterval(draw,33);

</script>

</body>
</html>
