<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gimbot Pinar</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
}

.content{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    z-index:5;
}

.profile{
    width:200px;
    height:200px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #00ff00;
    box-shadow:
        0 0 15px #00ff00,
        0 0 30px #00ff00,
        0 0 60px #00ff00;
    transition:.35s;
}

.profile:hover{
    transform:scale(1.08);
    box-shadow:
        0 0 30px #00ff00,
        0 0 60px #00ff00,
        0 0 100px #00ff00;
}

.content a{
    text-decoration:none;
}

h1{
    color:#00ff00;
    margin-top:20px;
    font-size:38px;
    text-shadow:0 0 10px #00ff00;
}

p{
    color:#8aff8a;
    margin-top:10px;
    font-size:18px;
}
</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="content">

<a href="https://www.facebook.com/rog.komputer/" target="_blank">
<img src="images/foto.avif" class="profile" alt="Foto Profil">
</a>

<h1>Gimbot Pinar</h1>

<p>Klik foto untuk membuka Facebook</p>

</div>

<script>

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;

    columns=Math.floor(canvas.width/fontSize);
    drops=[];

    for(let i=0;i<columns;i++){
        drops[i]=Math.random()*canvas.height/fontSize;
    }
}

const chars="01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワン";
const fontSize=16;

let columns=0;
let drops=[];

resize();
window.addEventListener("resize",resize);

function draw(){

    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00ff00";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){

        const text=chars[Math.floor(Math.random()*chars.length)];

        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
            drops[i]=0;
        }

        drops[i]++;

    }

}

setInterval(draw,33);

</script>

</body>
</html>
